<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switchman — Completing sign in…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b1020; --bg-card: #121a2b; --border: #223047; --border-2: #2c3d58;
      --text: #e6eef8; --text-2: #93a4ba; --text-3: #5f7189;
      --accent: #5CF2C7; --accent-dim: rgba(92,242,199,0.08); --accent-border: rgba(92,242,199,0.22);
      --red: #f87171; --green: #4ade80;
      --mono: 'JetBrains Mono','Fira Code',monospace;
      --sans: 'Inter',system-ui,sans-serif;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--bg-card); border: 1px solid var(--border-2);
      border-radius: 20px; padding: 48px 44px;
      width: 100%; max-width: 420px; text-align: center;
    }
    .logo {
      font-family: var(--mono); font-size: 14px; font-weight: 500;
      color: var(--text-3); text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 40px;
    }

    /* States */
    .state { display: none; flex-direction: column; align-items: center; gap: 16px; }
    .state.active { display: flex; }

    /* Spinner */
    .spinner-ring {
      width: 48px; height: 48px;
      border: 3px solid rgba(92,242,199,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .state-title { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
    .state-sub { font-size: 14px; color: var(--text-3); font-family: var(--mono); line-height: 1.6; }

    /* Success icon */
    .icon-ok {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    /* Error icon */
    .icon-err {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 13px; font-weight: 700;
      padding: 11px 24px; border-radius: 99px;
      text-decoration: none; transition: background 0.15s; cursor: pointer;
      border: none; margin-top: 8px;
    }
    .btn-primary { background: var(--accent); color: #061016; }
    .btn-primary:hover { background: #7EF7D3; }
    .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border-2); }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent-border); }

    .plan-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      border-radius: 99px; padding: 4px 14px;
      font-size: 12px; font-family: var(--mono); color: var(--accent);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <a href="/" class="logo">
    <img src="../../switchman-logo.svg" width="20" height="20" alt="">
    switchman
  </a>

  <!-- STATE: loading -->
  <div class="state active" id="state-loading">
    <div class="spinner-ring"></div>
    <div class="state-title">Completing sign in…</div>
    <div class="state-sub">Verifying your GitHub account</div>
  </div>

  <!-- STATE: redirecting to Polar -->
  <div class="state" id="state-redirecting">
    <div class="icon-ok">✓</div>
    <div class="state-title">Signed in</div>
    <div class="plan-pill" id="plan-pill">Monthly plan</div>
    <div class="state-sub">Taking you to checkout…</div>
    <div class="spinner-ring" style="width:28px;height:28px;border-width:2px;margin-top:4px;"></div>
  </div>

  <!-- STATE: error -->
  <div class="state" id="state-error">
    <div class="icon-err">✕</div>
    <div class="state-title" id="err-title">Something went wrong</div>
    <div class="state-sub" id="err-msg">We couldn't complete sign in. Please try again.</div>
    <a href="/pro" class="btn btn-primary">Back to Pro page</a>
    <a href="mailto:hello@switchman.dev" class="btn btn-ghost">Contact support</a>
  </div>
</div>

<!--
  SETUP: replace these with your real Supabase values.
  Same values as in pro.html.
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ─── CONFIG — replace these ────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://afilbolhlkiingnsupgr.supabase.co'
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmaWxib2xobGtpaW5nbnN1cGdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTIzOTIsImV4cCI6MjA4OTE2ODM5Mn0.8TBfHfRB0vEyKPMWBd6i1DNwx1nS9UqprIAsJf35n88'

  // Polar checkout URLs — same as pro.html
  const POLAR_MONTHLY = 'https://buy.polar.sh/polar_cl_i17GENDFPcqmphxNckeir6YCDlsEnTyPTJZoI0hWPXS'
  const POLAR_ANNUAL  = 'https://buy.polar.sh/polar_cl_i17GENDFPcqmphxNckeir6YCDlsEnTyPTJZoI0hWPXS'
  // ──────────────────────────────────────────────────────────────────────────

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

  function showState(id) {
    document.querySelectorAll('.state').forEach(s => s.classList.remove('active'))
    document.getElementById(id).classList.add('active')
  }

  function showError(title, msg) {
    document.getElementById('err-title').textContent = title
    document.getElementById('err-msg').textContent   = msg
    showState('state-error')
  }

  async function init() {
    // Supabase JS automatically reads the OAuth code/token from the URL hash
    // and exchanges it for a session on page load.
    const { data, error } = await supabase.auth.getSession()

    if (error || !data?.session) {
      // Session exchange failed or timed out
      showError(
        'Sign in failed',
        error?.message || 'The sign-in session could not be verified. Please try again.'
      )
      return
    }

    const session = data.session
    const user    = session.user

    // Read which plan the user chose (saved before OAuth redirect)
    const plan = sessionStorage.getItem('switchman_plan') || 'monthly'
    sessionStorage.removeItem('switchman_plan')

    // Show the redirecting state
    document.getElementById('plan-pill').textContent =
      plan === 'annual' ? 'Annual plan — 2 months free' : 'Monthly plan'
    showState('state-redirecting')

    // Build the Polar checkout URL, passing the user's info as metadata
    // Polar uses this to link the payment back to the Supabase user
    const baseUrl   = plan === 'annual' ? POLAR_ANNUAL : POLAR_MONTHLY
    const params    = new URLSearchParams({
      customer_email:       user.email || '',
      metadata_user_id:     user.id,
      metadata_plan:        plan,
      // Polar will redirect here after successful payment
      success_url: `${location.origin}/pro/success?plan=${plan}&user_id=${user.id}`,
    })

    // Short pause so the user can see the "Signed in" confirmation
    // before being whisked away to Polar
    await new Promise(r => setTimeout(r, 1200))

    window.location.href = `${baseUrl}?${params}`
  }

  init().catch(err => {
    console.error('Callback init error:', err)
    showError('Unexpected error', 'Something went wrong. Please go back and try again.')
  })
</script>

</body>
</html>
